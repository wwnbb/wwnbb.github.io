<div class='row'>
    <div class="four columns centered">
        <form name="form" novalidate novalidate>
            <label>Электронная почта</label>
            <input ng-class="{ error: form.$invalid || isUnchanged(user) }" name="email" type="email" placeholder="Email input" class="email input" ng-model='username' ng-model-options="{ updateOn: 'default blur', debounce: { default: 500, blur: 0 } }" ng-minlength=3 ng-maxlength=80 required>
            <div class="error-container"
                 ng-show="form.email.$dirty && form.email.$invalid">
                <small class="error"
                       ng-show="form.email.$error.minlength">
                    Слишком короткий адрес электронной почты.
                </small>
                <small class="error"
                       ng-show="form.email.$error.email && !form.email.$error.minlength">
                    Неправильно введен электронный адрес.
                </small>
                <small class="error"
                       ng-show="form.email.$error.maxlength">
                    Ваш email должен быть короче чем 80 символов
                </small>
            </div>
            <label>Пароль</label>
            <input ng-class="{ error: form.$invalid || isUnchanged(user) }" name="password" type="password" placeholder="Password input" class="password input" ng-model='password' ng-minlength=3 ng-maxlength=16 required>
            <div class="error-container"
                 ng-show="form.password.$dirty && form.password.$invalid">
                <small class="error"
                       ng-show="form.password.$error.required">
                    Введите пароль.
                </small>
                <small class="error"
                       ng-show="form.password.$error.minlength">
                    Слишком короткий пароль.
                </small>
                <small class="error"
                       ng-show="form.password.$error.maxlength">
                    Ваш пароль должен быть короче чем 16 символов
                </small>
            </div>
            <div class="medium success btn"><button type="submit" ng-disabled="form.$invalid || isUnchanged(user)">Log in</button></div>
        </form>
    </div>
</div>
