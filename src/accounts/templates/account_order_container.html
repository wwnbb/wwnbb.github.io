<div class='row' ng-controller='AccountOrderContainerCtr'>
    <div class="twelve columns centered">
        <fieldset>
            <legend>Добавть Заказ</legend>
            <div class="row">
                <div class="large-6 columns">
                    <label>Комментарий к заказу
                        <input type="text" placeholder="" ng-model="form.comment"/>
                    </label>
                </div>
                <div class="large-6 columns ">
                    <label>Дата окончания заказа
                        <input type="text" class="datetimepicker" placeholder="" ng-model="form.customer_date"/>
                    </label>
                </div>
            </div>
            <a href="" class="button" value="" ng-click="addOrderContainer()">Продолжить</a>
        </fieldset>
    </div>
</div>

<script type="text/javascript"> jQuery('.datetimepicker').datetimepicker( { onGenerate:function( ct ){ jQuery(this).find('.xdsoft_date.xdsoft_weekend') .addClass('xdsoft_disabled'); }, format:"d.m.Y H:i", lang: 'ru', minTime:'10:00', maxTime:'21:00', timepickerScrollbar:'false', dayOfWeekStart: 1 }) </script>
